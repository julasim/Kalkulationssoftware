services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-lv_manager}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lv_user} -d ${POSTGRES_DB:-lv_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lv_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lv_manager}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      PORT: 3000
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-julius@sima.or.at}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  db_data:
