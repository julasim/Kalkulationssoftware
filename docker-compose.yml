name: Kalkulationssoftware

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-lv_manager}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - default          # NUR privat — nie im proxy-Netz
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      PORT: 3000
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-julius@sima.or.at}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    expose:
      - "3000"           # nur containerintern sichtbar
    networks:
      - default          # NUR privat
    healthcheck:
      # Node 22 hat global fetch — kein curl/wget im Image nötig.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s   # Migrationen (db:deploy) laufen beim Start

  web:
    build:
      context: .
      dockerfile: packages/desktop/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # KEIN "ports:" — der Edge-Proxy erreicht den Container über das proxy-Netz.
    # Lokales Testen ohne Edge-Proxy: temporär `ports: ["8080:80"]` ergänzen.
    expose:
      - "80"
    networks:
      default: {}        # privat: erreicht api + db
      proxy:             # gemeinsam mit dem Edge-Proxy (edge-caddy)
        aliases:
          - kalkulationssoftware

networks:
  default: {}            # privates Projekt-Netz (api + db + web)
  proxy:
    external: true       # vom Edge-Proxy bereitgestellt — wird hier NICHT erstellt
    name: ${PROXY_NETWORK:-proxy}

volumes:
  db_data: {}
