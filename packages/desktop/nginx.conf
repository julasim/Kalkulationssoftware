server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Upload-Limit hochsetzen — ONLB-Leistungsbücher sind ~10 MB.
    # Etwas über dem @fastify/multipart-Limit (25 MB), damit Fastify die
    # saubere 400-Meldung liefert statt nginx ein nacktes 413.
    client_max_body_size 30m;

    # Gzip für gängige Texttypen
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # API-Weiterleitung an den Fastify-Container (Pfad-Präfix /api bleibt erhalten)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # SPA-Fallback für alle übrigen Routen
    location / {
        try_files $uri $uri/ /index.html;
    }
}
